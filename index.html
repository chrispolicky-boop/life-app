<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Project Hub</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#191D1A">

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Project Hub">
<meta name="mobile-web-app-capable" content="yes">

<style>
  html, body { margin:0; padding:0; background:#191D1A; }
</style>

</head>
<body>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#191D1A;
    --card:#232821;
    --ink:#ECEFE9;
    --ink-soft:#8B968D;
    --line:#2E342B;
    --teal:#3EBBA9;
    --indigo:#7C81F5;
    --gold:#E8B23D;
    --pink:#EA7EB0;
    --coral:#F2836E;
    --forest:#57B978;
    --font-display:'Poppins', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{ box-sizing:border-box; }
  #hub-b{
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--bg);
    min-height: 100vh;
    padding: calc(22px + env(safe-area-inset-top, 0px)) 16px 40px;
    line-height: 1.5;
    position: relative;
  }
  #hub-b button, #hub-b input, #hub-b textarea{ font-family: var(--font-body); }
  .wrap{ max-width: 560px; margin: 0 auto; }

  .header{ margin-bottom: 20px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .greet{ font-family: var(--font-display); font-weight: 700; font-size: 24px; letter-spacing: -0.01em; }
  .date{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
  .sync-icon-btn{
    flex-shrink:0; width:38px; height:38px; border-radius:50%;
    background: var(--card); border:1px solid var(--line); color: var(--ink-soft);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .sync-icon-btn svg{ width:18px; height:18px; }
  .sync-icon-btn:hover{ color: var(--ink); border-color: var(--teal); }
  .sync-dot{ position:absolute; top:-1px; right:-1px; width:9px; height:9px; border-radius:50%; border:2px solid var(--bg); background: var(--ink-soft); }
  .sync-dot.ok{ background: var(--forest); }
  .sync-dot.err{ background: var(--pink); }
  .sync-dot.pending{ background: var(--gold); }

  .ghost-btn{ font-family: var(--font-body); font-size: 11px; font-weight:600; color: var(--ink-soft); background: var(--card); border:1px solid var(--line); border-radius:10px; padding:7px 12px; white-space:nowrap; }
  .ghost-btn:hover{ color: var(--ink); border-color: var(--teal); }

  .sync-page-card{ background: var(--card); border:1px solid var(--line); border-radius:16px; padding:18px 18px 20px; margin-bottom:16px; }
  .sync-status-row{ display:flex; align-items:center; gap:9px; margin-bottom:4px; }
  .sync-status-dot{ width:9px; height:9px; border-radius:50%; background: var(--ink-soft); flex-shrink:0; }
  .sync-status-dot.ok{ background: var(--forest); }
  .sync-status-dot.err{ background: var(--pink); }
  .sync-status-dot.pending{ background: var(--gold); }
  .sync-status-text{ font-family: var(--font-display); font-weight:600; font-size:15px; }
  .sync-sub{ font-size:12.5px; color: var(--ink-soft); margin-top:2px; margin-bottom:14px; }
  .sync-btn-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .sync-btn{ border:none; background: var(--teal); color:#fff; border-radius:12px; padding:9px 16px; font-family: var(--font-display); font-weight:600; font-size:12.5px; }
  .sync-btn:hover{ filter: brightness(0.92); }
  .sync-btn.secondary{ background: var(--card); border:1px solid var(--line); color: var(--ink); }
  .sync-btn.danger{ background: var(--pink); }
  .back-link{ background:none; border:none; color: var(--ink-soft); font-size:12px; font-weight:600; margin-bottom:16px; padding:0; }
  .back-link:hover{ color: var(--ink); }

  .hero-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 18px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 22px;
  }
  .ring-wrap{ flex-shrink: 0; }
  .hero-text .hlabel{ font-family: var(--font-display); font-weight: 600; font-size: 16px; }
  .hero-text .hsub{ font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }

  .section-title{ font-family: var(--font-display); font-weight: 600; font-size: 19px; margin-bottom: 4px; display:flex; align-items:center; gap:8px; }
  .section-sub{ font-size: 12.5px; color: var(--ink-soft); margin-bottom: 16px; }

  /* Home grid */
  .proj-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
  .proj-card{
    background: var(--card); border:1px solid var(--line); border-radius:18px;
    padding: 16px 14px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .proj-card:hover{ border-color: var(--cat-color, var(--teal)); }
  .proj-name{ font-family: var(--font-display); font-weight:600; font-size: 13.5px; }
  .proj-sub{ font-size: 11px; color: var(--ink-soft); }
  .proj-card.add-card{ justify-content:center; color: var(--ink-soft); border-style:dashed; min-height: 128px; }
  .proj-card.add-card:hover{ color: var(--ink); border-color: var(--teal); }
  .proj-card.add-card .plus{ font-size: 28px; font-family: var(--font-display); line-height:1; }

  .card{ background: var(--card); border:1px solid var(--line); border-radius:16px; padding:16px 16px 18px; margin-bottom: 16px; }
  .card .k{ font-family: var(--font-mono); font-size: 10.5px; letter-spacing:.06em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; display:flex; align-items:center; justify-content:space-between; }
  .card textarea{ width:100%; border:1px solid var(--line); border-radius: 10px; background: var(--bg); color: var(--ink); padding: 11px 13px; font-size: 13.5px; line-height: 1.55; resize: vertical; min-height: 74px; font-family: var(--font-body); }
  .card textarea::placeholder{ color: var(--ink-soft); }
  .card textarea:focus{ outline: 2px solid var(--cat-color, var(--teal)); outline-offset: -1px; background: var(--card); }
  .ai-btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; border:none; background: var(--cat-color, var(--teal)); color:#fff; border-radius:12px; padding: 12px 16px; font-family: var(--font-display); font-weight:600; font-size:14px; }
  .ai-btn:hover{ filter:brightness(0.92); }
  .ai-btn svg{ width:16px; height:16px; }
  .ai-hint{ font-size:11.5px; color: var(--ink-soft); margin-top:8px; text-align:center; }

  .item-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 13px 14px;
    margin-bottom: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    border-left: 4px solid var(--cat-color, var(--teal));
  }
  .row{ display:flex; align-items:flex-start; gap: 11px; }
  .check{ width:22px; height:22px; border-radius:7px; border:2px solid var(--line); background:var(--bg); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; padding:0; }
  .check.done{ background: var(--cat-color, var(--teal)); border-color: var(--cat-color, var(--teal)); }
  .check.done::after{ content:'\2713'; color:#fff; font-size:13px; line-height:1; font-weight:700; }
  .txt{ flex:1; font-size: 14.5px; font-weight: 500; padding-top: 2px; }
  .txt.done{ text-decoration: line-through; color: var(--ink-soft); }
  .icon-btn{ background:none; border:none; color: var(--ink-soft); font-size:12px; padding: 3px 5px; font-family: var(--font-body); }
  .icon-btn:hover{ color: var(--ink); }
  .btn-row{ display:flex; gap: 2px; }
  .empty{ color: var(--ink-soft); font-size: 13.5px; font-style: italic; padding: 6px 2px 14px; }

  .add-row{ display:flex; gap: 8px; margin-top: 4px; }
  .add-row input{ flex:1; border: 1.5px solid var(--line); border-radius: 12px; padding: 11px 14px; font-size: 14px; background: var(--card); color: var(--ink); }
  .add-row input::placeholder{ color: var(--ink-soft); }
  .add-row input:focus{ outline:none; border-color: var(--cat-color, var(--teal)); }
  .add-row button{ border: none; background: var(--cat-color, var(--teal)); color: #fff; border-radius: 12px; padding: 0 20px; font-family: var(--font-display); font-weight: 600; font-size: 13px; }
  .add-row button:hover{ filter: brightness(0.92); }

  .danger-zone{ margin-top: 28px; padding-top: 16px; border-top: 1px dashed var(--line); }

  .bar-track{ width:100%; background: var(--bg); border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:6px; transition: width .2s ease; }
  .money-input{ border: 1.5px solid var(--line); border-radius: 12px; padding: 11px 14px; font-size: 14px; background: var(--card); color: var(--ink); width:100%; }
  .money-input::placeholder{ color: var(--ink-soft); }
  .money-input:focus{ outline:none; border-color: var(--teal); }

  .bottom-nav{
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(25,29,26,0.92);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    display: flex;
    padding: 8px 4px calc(8px + env(safe-area-inset-bottom, 0px));
    z-index: 10;
  }
  .nav-btn{
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; padding: 6px 1px; color: var(--ink-soft);
    font-family: var(--font-body); font-size: 8.5px; font-weight: 500;
    min-width: 0;
  }
  .nav-btn span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width: 100%; }
  .nav-btn svg{ width: 18px; height: 18px; }
  .nav-btn.active{ color: var(--teal); }

  #hub-b{ padding-bottom: 90px; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<div id="hub-b"></div>

<script>
(function(){
  const root = document.getElementById('hub-b');
  const STORAGE_KEY = 'project-hub-v1';
  const COLORS = ['#3EBBA9','#7C81F5','#E8B23D','#EA7EB0','#F2836E','#57B978'];

  const SEED_PROJECTS = [
    {
      id: 'fe-exam',
      name: 'FE Exam Prep',
      color: '#3EBBA9',
      scope: 'Pass the FE (Mechanical) exam in fall 2027. Build the habit early by solving one practice problem a day, work through the NCEES FE Mechanical reference handbook section by section, and take full-length practice exams starting summer 2027.',
      notes: '',
      tasks: [
        { text: "Solve today's FE practice problem" },
        { text: 'Get the NCEES FE Mechanical reference handbook (it’s free as a PDF)' },
        { text: 'Set up a spreadsheet or app to track daily problems by topic' },
        { text: 'Pick an FE prep course or question bank' }
      ]
    },
    {
      id: 'rc-sailboat',
      name: 'RC Sailboat',
      color: '#7C81F5',
      scope: 'Design and build a radio-controlled sailboat that I can pilot from my phone, and that automatically trims the sails and rudder angle based on live wind speed and direction from an onboard sensor.',
      notes: '',
      tasks: [
        { text: 'Research wind vane + anemometer sensor options' },
        { text: 'Pick a microcontroller (ESP32 for phone Bluetooth/WiFi control)' },
        { text: 'Sketch the hull and rig in CAD' },
        { text: 'Prototype the sail winch / trim mechanism' },
        { text: 'Design the phone control app or interface' }
      ]
    },
    {
      id: 'showcase-site',
      name: 'Showcase Website',
      color: '#E8B23D',
      scope: 'Build a personal portfolio site documenting every engineering project I finish (RC sailboat, drone, CAD work, research) so future employers can see real hands-on design experience, not just a resume line.',
      notes: '',
      tasks: [
        { text: 'Decide on a simple stack (static site is fine to start)' },
        { text: 'Write a case study for one finished project' },
        { text: 'Add resume, contact info, and links (LinkedIn, GitHub)' },
        { text: 'Deploy it live with a real URL' }
      ]
    }
  ];

  function icon(name){
    const paths = {
      sync: '<path d="M3 12a9 9 0 0115.3-6.4L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-15.3 6.4L3 16"/><path d="M3 21v-5h5"/>',
      home: '<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>',
      ai: '<path d="M12 3l1.9 4.9L19 9.8l-4.9 1.9L12 16.6l-1.9-4.9L5 9.8l4.9-1.9L12 3z"/><path d="M19 15l.9 2.3L22.2 18l-2.3.9L19 21.2l-.9-2.3L15.8 18l2.3-.9L19 15z"/>',
      gear: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.9 2.9l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.6V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.6 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.9-2.9l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.6-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.6-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.9-2.9l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.6V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.6 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.9 2.9l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.6 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.6 1z"/>',
      wallet: '<rect x="2.5" y="6" width="19" height="13" rx="2.5"/><path d="M2.5 10h19"/><path d="M16 14.2h2.2"/>',
      book: '<path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>',
      target: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2"/>',
      todo: '<path d="M9 6h11"/><path d="M9 12h11"/><path d="M9 18h11"/><path d="M4 6l1 1 2-2"/><path d="M4 12l1 1 2-2"/><path d="M4 18l1 1 2-2"/>',
      cart: '<circle cx="9" cy="20" r="1.3"/><circle cx="18" cy="20" r="1.3"/><path d="M2.5 3h2l2.3 12a2 2 0 002 1.7h8.7a2 2 0 002-1.6L21 8H6.5"/>',
      pot: '<path d="M4 10h16l-1.2 8.2A2 2 0 0117 20H7a2 2 0 01-1.8-1.8z"/><path d="M2 10h20"/><path d="M8 10V6.5A4 4 0 0112 2.5h0a4 4 0 014 3.5V10"/>',
      calendar: '<rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M16 2.5v4M8 2.5v4M3 10h18"/>',
      more: '<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>'
    };
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + paths[name] + '</svg>';
  }

  const TOP_TABS = [
    { key: 'home', label: 'Home', icon: 'home' },
    { key: 'calendar', label: 'Calendar', icon: 'calendar' },
    { key: 'projects', label: 'Projects', icon: 'gear' },
    { key: 'finance', label: 'Finance', icon: 'wallet' },
    { key: 'school', label: 'School', icon: 'book' },
    { key: 'todo', label: 'To-Do', icon: 'todo' },
    { key: 'goals', label: 'Goals', icon: 'target' },
    { key: 'groceries', label: 'Groceries', icon: 'cart' },
    { key: 'cookbook', label: 'Cookbook', icon: 'pot' }
  ];

  const PINNED_TAB_KEYS = ['home', 'calendar', 'todo', 'goals'];
  const BURIED_TAB_KEYS = TOP_TABS.map(t => t.key).filter(k => !PINNED_TAB_KEYS.includes(k));

  function makeId(){ return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  function defaultData(){
    return SEED_PROJECTS.map(p => ({
      id: p.id,
      name: p.name,
      color: p.color,
      scope: p.scope,
      notes: p.notes,
      tasks: p.tasks.map(t => ({ id: makeId(), text: t.text, done: false }))
    }));
  }

  // Firebase's Realtime Database can hand back array-like data as a
  // keyed object (e.g. after certain edits), so normalize defensively
  // rather than assuming .map/.filter/.push are always available.
  function asArray(x){
    if(Array.isArray(x)) return x;
    if(x && typeof x === 'object') return Object.values(x);
    return [];
  }
  function normalizeProject(p){
    p = p || {};
    return {
      id: p.id || makeId(),
      name: p.name || 'Untitled project',
      color: p.color || COLORS[0],
      scope: p.scope || '',
      notes: p.notes || '',
      tasks: asArray(p.tasks).map(t => ({ id: (t && t.id) || makeId(), text: (t && t.text) || '', done: !!(t && t.done) }))
    };
  }
  function normalizeProjects(list){ return asArray(list).map(normalizeProject); }

  const GOAL_CATEGORIES = [
    { key: 'physical', label: 'Physical', color: '#F2836E' },
    { key: 'spiritual', label: 'Spiritual', color: '#7C81F5' },
    { key: 'intellectual', label: 'Intellectual', color: '#3EBBA9' },
    { key: 'emotional', label: 'Emotional', color: '#EA7EB0' }
  ];
  function goalCategoryColor(key){
    const c = GOAL_CATEGORIES.find(x => x.key === key);
    return c ? c.color : GOAL_CATEGORIES[0].color;
  }
  function normalizeGoal(g){
    g = g || {};
    const validCategory = GOAL_CATEGORIES.some(c => c.key === g.category) ? g.category : 'physical';
    return {
      id: g.id || makeId(),
      category: validCategory,
      name: g.name || 'Untitled goal',
      plan: g.plan || ''
    };
  }
  function normalizeGoals(list){ return asArray(list).map(normalizeGoal); }

  const GROCERY_CATEGORIES = [
    { key: 'dairy', label: 'Dairy' },
    { key: 'meat', label: 'Meat' },
    { key: 'vegetables', label: 'Vegetables' },
    { key: 'fruit', label: 'Fruit' },
    { key: 'canned', label: 'Canned Goods' },
    { key: 'spices', label: 'Spices' },
    { key: 'dry', label: 'Dry Goods' },
    { key: 'snacks', label: 'Snacks' }
  ];
  function validGroceryCategory(key){ return GROCERY_CATEGORIES.some(c => c.key === key) ? key : 'dry'; }
  function normalizeGroceryItem(i){
    i = i || {};
    return {
      id: i.id || makeId(),
      category: validGroceryCategory(i.category),
      text: i.text || '',
      done: !!i.done,
      fromRecipe: i.fromRecipe || null
    };
  }
  function normalizeGroceryItems(list){ return asArray(list).map(normalizeGroceryItem); }

  const RECIPE_CATEGORIES = [
    { key: 'breakfast', label: 'Breakfast' },
    { key: 'lunch', label: 'Lunch' },
    { key: 'dinner', label: 'Dinner' },
    { key: 'dessert', label: 'Dessert' },
    { key: 'pastries', label: 'Pastries' }
  ];
  function normalizeIngredient(ing){
    ing = ing || {};
    return {
      id: ing.id || makeId(),
      text: ing.text || '',
      category: validGroceryCategory(ing.category)
    };
  }
  function normalizeRecipe(r){
    r = r || {};
    const validCategory = RECIPE_CATEGORIES.some(c => c.key === r.category) ? r.category : 'dinner';
    return {
      id: r.id || makeId(),
      category: validCategory,
      title: r.title || 'Untitled recipe',
      ingredients: asArray(r.ingredients).map(normalizeIngredient),
      instructions: r.instructions || ''
    };
  }
  function normalizeRecipes(list){ return asArray(list).map(normalizeRecipe); }

  const BUDGET_PERIODS = [
    { key: 'weekly', label: 'Weekly' },
    { key: 'monthly', label: 'Monthly' },
    { key: 'yearly', label: 'Yearly' }
  ];
  function toMoney(x){ const n = typeof x === 'number' ? x : parseFloat(x); return isFinite(n) ? n : 0; }
  function normalizeBudget(b){
    b = b || {};
    const validPeriods = BUDGET_PERIODS.map(p => p.key);
    return {
      id: b.id || makeId(),
      name: b.name || 'Untitled budget',
      limit: toMoney(b.limit),
      period: validPeriods.includes(b.period) ? b.period : 'monthly',
      expenses: asArray(b.expenses).map(e => ({ id: (e && e.id) || makeId(), amount: toMoney(e && e.amount), note: (e && e.note) || '', date: (e && e.date) || new Date().toISOString() }))
    };
  }
  function normalizeBudgets(list){ return asArray(list).map(normalizeBudget); }
  function spentOf(b){ return b.expenses.reduce((sum, e) => sum + e.amount, 0); }
  function budgetPct(b){ return b.limit ? Math.round((spentOf(b) / b.limit) * 100) : 0; }

  function startOfWeek(date, weeksAgo){
    const d = new Date(date);
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() - d.getDay() - weeksAgo*7);
    return d;
  }

  function computePeriodBuckets(periodKey, count){
    const budgets = state.budgets.filter(b => b.period === periodKey);
    const now = new Date();
    const buckets = [];
    for(let i = count - 1; i >= 0; i--){
      let start, end, label;
      if(periodKey === 'weekly'){
        start = startOfWeek(now, i);
        end = new Date(start.getTime() + 7*24*60*60*1000);
        label = shortWeekLabel(start);
      } else {
        start = startOfMonth(now, i);
        end = new Date(start.getFullYear(), start.getMonth()+1, 1);
        label = shortMonthLabel(start);
      }
      buckets.push({ start, end, label, total: 0, perBudget: {} });
    }
    budgets.forEach(b => {
      b.expenses.forEach(e => {
        const d = new Date(e.date || Date.now());
        const bucket = buckets.find(bk => d >= bk.start && d < bk.end);
        if(bucket){
          bucket.total += e.amount;
          bucket.perBudget[b.id] = (bucket.perBudget[b.id] || 0) + e.amount;
        }
      });
    });
    return { budgets, buckets };
  }

  function lineChartSVG(buckets, limit){
    const W = 320, H = 170, padL = 26, padR = 26, padT = 26, padB = 26;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const maxVal = Math.max(limit, ...buckets.map(b => b.total), 1) * 1.15;
    const n = buckets.length;
    const stepX = n > 1 ? plotW / (n - 1) : 0;
    const xAt = i => padL + stepX * i;
    const yAt = v => padT + plotH - (v / maxVal) * plotH;

    const points = buckets.map((b, i) => ({ x: xAt(i), y: yAt(b.total), over: limit > 0 && b.total > limit, total: b.total, label: b.label }));

    const segments = points.slice(1).map((p, i) => {
      const prev = points[i];
      const over = p.over || prev.over;
      return `<line x1="${prev.x}" y1="${prev.y}" x2="${p.x}" y2="${p.y}" style="stroke:${over ? 'var(--pink)' : 'var(--teal)'}; stroke-width:2.5; stroke-linecap:round;"/>`;
    }).join('');

    const dots = points.map(p => `
      <circle cx="${p.x}" cy="${p.y}" r="4.5" style="fill:${p.over ? 'var(--pink)' : 'var(--teal)'}; stroke:var(--card); stroke-width:2;"/>
      <text x="${p.x}" y="${p.y - 10}" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" style="fill:${p.over ? 'var(--pink)' : 'var(--ink-soft)'};">${fmtMoneyShort(p.total)}</text>
      <text x="${p.x}" y="${H - 8}" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" style="fill:var(--ink-soft);">${p.label}</text>`).join('');

    const limitLine = limit > 0 ? `<line x1="${padL}" y1="${yAt(limit)}" x2="${W - padR}" y2="${yAt(limit)}" style="stroke:var(--line); stroke-width:1.5; stroke-dasharray:4 3;"/>` : '';

    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; display:block;">${limitLine}${segments}${dots}</svg>`;
  }

  function urlBase64ToUint8Array(base64String){

        state.todoTasks = [];
        state.goals = [];
        state.groceryItems = [];
        state.recipes = [];
      }
    }catch(e){ state.projects = defaultData(); state.budgets = []; state.savingsGoals = []; state.earnings = []; state.calendarBlocks = defaultCalendarBlocks(); state.todoTasks = []; state.goals = []; state.groceryItems = []; state.recipes = []; }
    state.loaded = true;
    render();
    initFirebase();
    refreshPushStatus();
  }
  function save(rerender){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects: state.projects, budgets: state.budgets, savingsGoals: state.savingsGoals, earnings: state.earnings, calendarBlocks: state.calendarBlocks, todoTasks: state.todoTasks, goals: state.goals, groceryItems: state.groceryItems, recipes: state.recipes })); }catch(e){}

  }
  function pct(tasks){
    if(!tasks || !tasks.length) return 0;
    const done = tasks.filter(t => t.done).length;

  }
  function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

  function greeting(){

  function ringSVG(percent, color, size){
    size = size || 64;
    const r = size === 64 ? 26 : 22, c = 2*Math.PI*r;
    const off = c - (c*percent/100);
    const fontSize = size === 64 ? 14 : 12;
    return `<svg width="${size}" height="${size}" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="${r}" fill="none" stroke="#2E342B" stroke-width="7"/>
      <circle cx="32" cy="32" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 32 32)"/>
      <text x="32" y="37" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-weight="600" font-size="${fontSize}" fill="#ECEFE9">${percent}%</text>
    </svg>`;
  }

  function syncDotClass(){
    if(state.sync.status === 'connected') return 'ok';
    if(state.sync.status === 'error' || state.sync.status === 'unavailable' || state.sync.status === 'wrong-account') return 'err';
    return 'pending';
  }
  function syncStatusLabel(){
    if(state.sync.status === 'connected') return 'Synced';
    if(state.sync.status === 'signed-out') return 'Sign in to sync';
    if(state.sync.status === 'wrong-account') return 'Wrong Google account';
    if(state.sync.status === 'error') return 'Sync error';
    if(state.sync.status === 'unavailable') return 'Sync unavailable';
    return 'Connecting…';
  }
  function relTime(iso){
    if(!iso) return 'never';
    const diff = Math.max(0, Date.now() - new Date(iso).getTime());
    const s = Math.round(diff/1000);
    if(s < 10) return 'just now';
    if(s < 60) return s + 's ago';
    const m = Math.round(s/60);
    if(m < 60) return m + 'm ago';
    const h = Math.round(m/60);
    if(h < 24) return h + 'h ago';
    return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  }

  function buildAiPrompt(p){

    let msg = `I'm a mechanical engineering student working on a project called "${p.name}."\n\n`;
    msg += `Defined scope: ${p.scope || '(not written yet)'}\n\n`;
    if(openTasks.length) msg += `Open tasks: ${openTasks.join('; ')}\n`;
    if(doneTasks.length) msg += `Already done: ${doneTasks.join('; ')}\n`;
    if(p.notes && p.notes.trim()) msg += `\nNotes so far: ${p.notes.trim()}\n`;
    msg += `\nHelp me make progress on this — suggest concrete next steps, flag anything I'm missing, and answer any engineering questions I have.`;
    return msg;

  const CAL_DAY_START = 6, CAL_DAY_END = 23, CAL_PX_PER_HOUR = 56;

  function renderDayStrip(selectedIso){
    const selected = new Date(selectedIso + 'T00:00:00');

  function renderTimeline(blocks){
    const totalHeight = (CAL_DAY_END - CAL_DAY_START) * CAL_PX_PER_HOUR;
    const hourLines = [];
    for(let h = CAL_DAY_START; h <= CAL_DAY_END; h++){
      const top = (h - CAL_DAY_START) * CAL_PX_PER_HOUR;
      const label = h === 0 ? '12 AM' : h < 12 ? h + ' AM' : h === 12 ? '12 PM' : (h - 12) + ' PM';
      hourLines.push(`<div style="position:absolute; top:${top}px; left:44px; right:0; border-top:1px solid var(--line);"></div>`);
      hourLines.push(`<div style="position:absolute; top:${top - 6}px; left:0; width:40px; font-family:var(--font-mono); font-size:9.5px; color:var(--ink-soft); text-align:right;">${label}</div>`);
    }
    const blockEls = blocks.map(b => {
      const color = typeColor(b.type);
      const startMin = timeToMinutes(b.start) - CAL_DAY_START * 60;
      const durMin = Math.max(20, timeToMinutes(b.end) - timeToMinutes(b.start));
      const top = Math.max(0, startMin / 60 * CAL_PX_PER_HOUR);
      const height = Math.max(26, durMin / 60 * CAL_PX_PER_HOUR - 2);
      return `<button data-open-block="${b.id}" style="position:absolute; top:${top}px; left:48px; right:2px; height:${height}px; background:${color}26; border-left:4px solid ${color}; border-radius:8px; padding:5px 8px; text-align:left; overflow:hidden; user-select:none; -webkit-user-select:none; -webkit-user-drag:none;">
        <div style="display:flex; align-items:center; gap:5px; font-weight:600; font-size:12px; color:var(--ink);">
          <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(b.title)}</span>
          ${b.recurring ? '<span style="flex-shrink:0; width:11px; height:11px; color:var(--ink-soft);">' + icon('sync') + '</span>' : ''}
        </div>
        <div style="font-family:var(--font-mono); font-size:9.5px; color:var(--ink-soft);">${fmtTime(b.start)} – ${fmtTime(b.end)}</div>
      </button>`;
    }).join('');
    return `<div style="position:relative; height:${totalHeight}px; margin-bottom:16px; user-select:none; -webkit-user-select:none;">${hourLines.join('')}${blockEls}</div>`;
  }

  function renderMonthGrid(cursorIso){
    const cursor = new Date(cursorIso + 'T00:00:00');

    const startWeekday = firstOfMonth.getDay();

    const todayIso = isoDate(new Date());

  function renderFinanceCategoryCard(key, label){
    let current, max, color, count, unit;
    if(key === 'savings'){
      max = state.savingsGoals.reduce((s, g) => s + g.target, 0);
      current = state.savingsGoals.reduce((s, g) => s + savedOf(g), 0);
      count = state.savingsGoals.length;
      unit = 'goal';
    } else {
      const items = state.budgets.filter(b => b.period === key);
      max = items.reduce((s, b) => s + b.limit, 0);
      current = items.reduce((s, b) => s + spentOf(b), 0);
      count = items.length;
      unit = 'budget';
    }
    const p = max ? Math.round((current / max) * 100) : 0;
    color = key === 'savings' ? savingsBarColor(p) : budgetBarColor(p);
    return `
      <button class="item-card" style="display:block; width:100%; text-align:left; border-left-color:${color};" data-open-category="${key}">

          <div style="font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); white-space:nowrap;">${fmtMoney(current)} / ${fmtMoney(max)}</div>

        <div class="section-title">Earnings</div>
        <div class="section-sub">Log income and track your total over time.</div>
        ${renderEarningsTrend()}
        ${renderEarningsListBody()}`;
    }
    const cat = FINANCE_CATEGORIES.find(c => c.key === categoryKey);
    const label = cat ? cat.label : '';
    const body = categoryKey === 'savings'
      ? renderSavingsListBody()
      : renderBudgetListBody(categoryKey, label);
    const subtitle = categoryKey === 'savings'
      ? "Add what you put toward each goal and watch its bar move."
      : `Track spending against what you've budgeted for each ${label.toLowerCase()} category.`;
    const trend = (categoryKey === 'weekly' || categoryKey === 'monthly') ? renderTrendSection(categoryKey, label) : '';
    return `
      <button class="back-link" id="back-btn">← Finance</button>
      <div class="section-title">${label}</div>
      <div class="section-sub">${subtitle}</div>
      ${trend}
      ${body}`;
  }

  function renderSavingsGoalDetail(g){
    const saved = savedOf(g);
    const p = savingsPct(g);
    const remaining = g.target - saved;
    const contribRows = g.contributions.slice().reverse().map(c => `
      <div class="item-card" style="border-left-color:${savingsBarColor(p)};">
        <div class="row">
          <div class="txt">${escapeHtml(c.note || 'Contribution')}</div>
          <div style="font-family:var(--font-mono); font-size:13px; padding-top:2px;">${fmtMoney(c.amount)}</div>
          <div class="btn-row">
            <button class="icon-btn" data-del-contrib="${c.id}">✕</button>
          </div>
        </div>
      </div>`).join('');

    return `
      <button class="back-link" id="back-btn">← Savings</button>

      <div class="hero-card" style="display:block;">
        <div class="hlabel">${escapeHtml(g.name)}</div>
        <div class="hsub" style="margin-bottom:12px;">${fmtMoney(saved)} of ${fmtMoney(g.target)} saved ${p >= 100 ? '— goal reached!' : '— ' + fmtMoney(remaining) + ' to go'}</div>
        ${barHTML(p, true, savingsBarColor(p))}
      </div>

      <div class="section-title" style="font-size:16px;">Contributions</div>
      <div class="section-sub">Add what you put toward this goal and watch the bar move.</div>
      ${g.contributions.length ? contribRows : '<div class="empty">No contributions logged yet.</div>'}
      <div class="add-row">
        <input type="number" id="contrib-amount" placeholder="Amount" inputmode="decimal" style="max-width:100px;" />
        <input type="text" id="contrib-note" placeholder="Note (optional)" />
        <button id="add-contrib-btn">Add</button>
      </div>

      <div class="card" style="margin-top:20px;">
        <div class="k">Target amount</div>
        <input type="number" id="edit-savings-target" value="${g.target}" inputmode="decimal" class="money-input" />
      </div>

      <div class="danger-zone">
        <button class="sync-btn danger" id="delete-savings-btn">${state.savingsDeleteArmed ? 'Tap again to permanently delete' : 'Delete goal'}</button>
      </div>`;
  }

  function renderBudgetDetail(b){
    const spent = spentOf(b);
    const p = budgetPct(b);
    const remaining = b.limit - spent;
    const expenseRows = b.expenses.slice().reverse().map(e => `
      <div class="item-card" style="border-left-color:${budgetBarColor(p)};">
        <div class="row">
          <div class="txt">${escapeHtml(e.note || 'Expense')}</div>
          <div style="font-family:var(--font-mono); font-size:13px; padding-top:2px;">${fmtMoney(e.amount)}</div>
          <div class="btn-row">
            <button class="icon-btn" data-del-expense="${e.id}">✕</button>
          </div>
        </div>
      </div>`).join('');

    const periodLabel = (BUDGET_PERIODS.find(x => x.key === b.period) || {}).label || 'Finance';
    return `
      <button class="back-link" id="back-btn">← ${periodLabel}</button>

      <div class="hero-card" style="display:block;">
        <div class="hlabel">${escapeHtml(b.name)}</div>
        <div class="hsub" style="margin-bottom:12px;">${fmtMoney(spent)} of ${fmtMoney(b.limit)} spent — ${remaining >= 0 ? fmtMoney(remaining) + ' left' : fmtMoney(-remaining) + ' over budget'}</div>
        ${barHTML(p, true, budgetBarColor(p))}
      </div>

      <div class="section-title" style="font-size:16px;">Expenses</div>
      <div class="section-sub">Add what you spend and watch the bar move.</div>
      ${b.expenses.length ? expenseRows : '<div class="empty">No expenses logged yet.</div>'}
      <div class="add-row">
        <input type="number" id="expense-amount" placeholder="Amount" inputmode="decimal" style="max-width:100px;" />
        <input type="text" id="expense-note" placeholder="What was it for? (optional)" />
        <button id="add-expense-btn">Add</button>
      </div>

      <div class="card" style="margin-top:20px;">
        <div class="k">Budget amount</div>
        <input type="number" id="edit-budget-limit" value="${b.limit}" inputmode="decimal" class="money-input" />
      </div>

      <div class="danger-zone">
        <button class="sync-btn danger" id="delete-budget-btn">${state.budgetDeleteArmed ? 'Tap again to permanently delete' : 'Delete budget'}</button>
      </div>`;
  }

  function renderProjectsTab(){
    const cards = state.projects.map(p => {
      const p2 = pct(p.tasks);
      const doneCt = p.tasks.filter(t=>t.done).length;
      return `
        <button class="proj-card" style="--cat-color:${p.color}" data-open="${p.id}">
          ${ringSVG(p2, p.color, 56)}
          <div class="proj-name">${escapeHtml(p.name)}</div>
          <div class="proj-sub">${doneCt} of ${p.tasks.length} tasks</div>
        </button>`;
    }).join('');
    const addTile = state.addingProject ? `
        <div class="proj-card add-card" style="border-style:solid; cursor:default;">
          <input type="text" id="new-project-input" placeholder="Project name…" style="width:100%; text-align:center; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:8px 6px; color:var(--ink); font-size:13px;" />
          <div style="display:flex; gap:6px; width:100%;">
            <button id="new-project-save" style="flex:1; border:none; background:var(--teal); color:#fff; border-radius:8px; padding:7px; font-size:12px; font-weight:600; font-family:var(--font-display);">Add</button>
            <button id="new-project-cancel" style="flex:1; border:1px solid var(--line); background:transparent; color:var(--ink-soft); border-radius:8px; padding:7px; font-size:12px;">Cancel</button>
          </div>
        </div>` : `
        <button class="proj-card add-card" id="add-project-btn">
          <div class="plus">+</div>
          <div class="proj-name">New project</div>
        </button>`;
    return `
      <div class="section-title">Your Projects</div>
      <div class="section-sub">Tap a project to see its scope, tasks, and notes.</div>
      <div class="proj-grid">
        ${cards}
        ${addTile}
      </div>`;
  }

  function renderProject(p){
    const p2 = pct(p.tasks);
    const doneCt = p.tasks.filter(t=>t.done).length;
    const taskRows = p.tasks.map(t => `
      <div class="item-card" style="--cat-color:${p.color}">
        <div class="row">
          <button class="check ${t.done?'done':''}" style="--cat-color:${p.color}" data-toggle="${t.id}"></button>
          <div class="txt ${t.done?'done':''}">${escapeHtml(t.text)}</div>
          <div class="btn-row">
            <button class="icon-btn" data-del-task="${t.id}">✕</button>
          </div>
        </div>
      </div>`).join('');

    return `
      <button class="back-link" id="back-btn">← All projects</button>

      <div class="hero-card">
        <div class="ring-wrap">${ringSVG(p2, p.color)}</div>
        <div class="hero-text">
          <div class="hlabel">${escapeHtml(p.name)}</div>
          <div class="hsub">${doneCt} of ${p.tasks.length} tasks done</div>
        </div>
      </div>

      <div class="card" style="--cat-color:${p.color}">
        <div class="k">Defined Scope</div>
        <textarea data-scope placeholder="What exactly are you trying to accomplish with this project?">${escapeHtml(p.scope)}</textarea>
      </div>

      <div class="card" style="--cat-color:${p.color}">
        <div class="k">Ask AI about this project</div>
        <button class="ai-btn" style="--cat-color:${p.color}" id="ask-ai-btn">${icon('ai')} Open in Claude</button>
        <div class="ai-hint">Opens a new Claude chat pre-filled with this project's scope, tasks, and notes.</div>
      </div>

      <div class="section-title" style="font-size:16px;">Tasks</div>
      <div class="section-sub">Checking these off moves the ring above.</div>
      ${p.tasks.length ? taskRows : '<div class="empty">No tasks yet — add your first one below.</div>'}
      <div class="add-row">
        <input type="text" id="task-input" placeholder="Add a task…" />
        <button style="--cat-color:${p.color}" id="add-task-btn">Add</button>
      </div>

      <div class="card" style="--cat-color:${p.color}; margin-top:20px;">
        <div class="k">Notes — things I've learned</div>
        <textarea data-notes placeholder="Jot down anything worth remembering as you work on this…">${escapeHtml(p.notes)}</textarea>
      </div>

      <div class="danger-zone">
        <button class="sync-btn danger" id="delete-project-btn">${state.deleteArmed ? 'Tap again to permanently delete' : 'Delete project'}</button>
      </div>`;
  }

  function render(){
    try{
      renderInner();
    }catch(e){
      root.innerHTML = `
        <div style="padding:32px 20px; color:#ECEFE9; font-family:sans-serif; max-width:480px; margin:0 auto;">
          <div style="font-weight:700; font-size:18px; margin-bottom:8px;">Something went wrong</div>
          <div style="color:#8B968D; font-size:13px; margin-bottom:18px; line-height:1.5;">The app hit an error trying to display your data. If you're signed in for sync, your data is safe in the cloud. Try reloading first — if it keeps happening, resetting this device's local copy usually fixes it (it will re-download from the cloud once you sign in again).</div>
          <button id="recover-reload-btn" style="width:100%; margin-bottom:10px; border:none; background:#3EBBA9; color:#fff; border-radius:12px; padding:13px; font-weight:600; font-size:14px;">Reload</button>
          <button id="recover-reset-btn" style="width:100%; border:1px solid #2E342B; background:transparent; color:#ECEFE9; border-radius:12px; padding:13px; font-size:14px;">Reset local data &amp; reload</button>
        </div>`;
      const reloadBtn = document.getElementById('recover-reload-btn');
      if(reloadBtn) reloadBtn.addEventListener('click', () => location.reload());
      const resetBtn = document.getElementById('recover-reset-btn');
      if(resetBtn) resetBtn.addEventListener('click', () => {
        try{ localStorage.removeItem(STORAGE_KEY); }catch(err){}
        location.reload();
      });
    }
  }

  function renderInner(){
    if(!state.loaded){ root.innerHTML = '<div style="padding:40px;color:#8B968D;">Loading…</div>'; return; }

    let bodyHtml;
    if(state.view === 'sync'){
      bodyHtml = renderSyncPage();
    } else if(state.view === 'project'){
      const p = state.projects.find(x => x.id === state.activeProject);
      if(!p){ state.view = 'tab'; state.tab = 'projects'; bodyHtml = renderProjectsTab(); }
      else bodyHtml = renderProject(p);
    } else if(state.view === 'budget'){
      const b = state.budgets.find(x => x.id === state.activeBudget);
      if(!b){ state.view = 'tab'; state.tab = 'finance'; bodyHtml = renderFinanceTab(); }
      else bodyHtml = renderBudgetDetail(b);
    } else if(state.view === 'savings'){
      const g = state.savingsGoals.find(x => x.id === state.activeSavingsGoal);
      if(!g){ state.view = 'tab'; state.tab = 'finance'; bodyHtml = renderFinanceTab(); }
      else bodyHtml = renderSavingsGoalDetail(g);
    } else if(state.view === 'financeCategory'){
      bodyHtml = renderFinanceCategoryDetail(state.financeCategory);
    } else if(state.view === 'calendarBlock'){
      const b = state.calendarBlocks.find(x => x.id === state.activeCalendarBlock);
      if(!b){ state.view = 'tab'; state.tab = 'calendar'; bodyHtml = renderCalendarTab(); }
      else bodyHtml = renderCalendarBlockDetail(b);
    } else if(state.view === 'todoCategory'){
      bodyHtml = renderTodoCategoryDetail(state.todoCategory);
    } else if(state.view === 'todoTimeView'){
      bodyHtml = renderTodoTimeViewDetail(state.todoTimeView);
    } else if(state.view === 'goalCategory'){
      bodyHtml = renderGoalCategoryDetail(state.activeGoalCategory);
    } else if(state.view === 'goal'){
      const g = state.goals.find(x => x.id === state.activeGoal);
      if(!g){ state.view = 'tab'; state.tab = 'goals'; bodyHtml = renderGoalsTab(); }
      else bodyHtml = renderGoalDetail(g);
    } else if(state.view === 'recipeCategory'){
      bodyHtml = renderRecipeCategoryDetail(state.activeRecipeCategory);
    } else if(state.view === 'recipe'){
      const r = state.recipes.find(x => x.id === state.activeRecipe);
      if(!r){ state.view = 'tab'; state.tab = 'cookbook'; bodyHtml = renderRecipesTab(); }
      else bodyHtml = renderRecipeDetail(r);
    } else {
      if(state.tab === 'calendar') bodyHtml = renderCalendarTab();
      else if(state.tab === 'projects') bodyHtml = renderProjectsTab();
      else if(state.tab === 'finance') bodyHtml = renderFinanceTab();
      else if(state.tab === 'school') bodyHtml = renderPlaceholderTab('School', 'Classes, assignments, and deadlines.');
      else if(state.tab === 'todo') bodyHtml = renderTodoTab();
      else if(state.tab === 'goals') bodyHtml = renderGoalsTab();
      else if(state.tab === 'groceries') bodyHtml = renderGroceriesTab();
      else if(state.tab === 'cookbook') bodyHtml = renderRecipesTab();
      else if(state.tab === 'more') bodyHtml = renderMoreTab();
      else bodyHtml = renderHomeTab();
    }

    root.innerHTML = `
      <div class="wrap">
        <div class="header">
          <div>
            <div class="greet">${greeting()}, Chris</div>
            <div class="date">${fmtDate()}</div>
          </div>
          <button class="sync-icon-btn" id="sync-icon-btn" title="Sync settings">
            ${icon('sync')}
            <span class="sync-dot ${syncDotClass()}"></span>
          </button>
        </div>
        ${bodyHtml}
      </div>
      <div class="bottom-nav">
        ${TOP_TABS.filter(t => PINNED_TAB_KEYS.includes(t.key)).map(t => `
        <button class="nav-btn ${(state.view==='tab' && state.tab===t.key)?'active':''}" data-tab="${t.key}">${icon(t.icon)}<span>${t.label}</span></button>`).join('')}
        <button class="nav-btn ${(state.view==='tab' && (state.tab==='more' || BURIED_TAB_KEYS.includes(state.tab)))?'active':''}" data-tab="more">${icon('more')}<span>More</span></button>
      </div>`;

    root.querySelector('#sync-icon-btn').addEventListener('click', () => { state.view='sync'; render(); window.scrollTo(0,0); });
    root.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.tab = btn.getAttribute('data-tab');
        state.view = 'tab';
        state.activeProject = null;
        state.deleteArmed = false;
        state.addingProject = false;
        state.activeBudget = null;
        state.budgetDeleteArmed = false;
        state.addingBudget = false;
        state.activeSavingsGoal = null;
        state.savingsDeleteArmed = false;
        state.addingSavingsGoal = false;
        state.financeCategory = null;
        state.activeCalendarBlock = null;
        state.addingCalendarBlock = false;
        state.calendarBlockDeleteArmed = false;
        state.calendarMonthView = false;
        state.todoCategory = null;
        state.todoTimeView = null;
        state.addingTodoTask = false;
        state.activeGoalCategory = null;
        state.activeGoal = null;
        state.addingGoal = false;
        state.goalDeleteArmed = false;
        state.activeRecipeCategory = null;
        state.activeRecipe = null;
        state.addingRecipe = false;
        state.recipeDeleteArmed = false;
        state.recipeUseStatus = '';
        render(); window.scrollTo(0,0);
      });
    });

    const backBtn = root.querySelector('#back-btn');
    if(backBtn) backBtn.addEventListener('click', () => {
      if(state.view === 'budget' || state.view === 'savings'){
        // step back to the finance category page these were opened from
        state.view = 'financeCategory';
        state.activeBudget = null;
        state.budgetDeleteArmed = false;
        state.activeSavingsGoal = null;
        state.savingsDeleteArmed = false;
      } else if(state.view === 'financeCategory'){
        state.view = 'tab';
        state.financeCategory = null;
        state.addingBudget = false;
        state.addingSavingsGoal = false;
      } else if(state.view === 'calendarBlock'){
        state.view = 'tab';
        state.activeCalendarBlock = null;
        state.calendarBlockDeleteArmed = false;
      } else if(state.view === 'todoCategory' || state.view === 'todoTimeView'){
        state.view = 'tab';
        state.todoCategory = null;
        state.todoTimeView = null;
        state.addingTodoTask = false;
      } else if(state.view === 'goal'){
        // step back to the goal category page this was opened from
        state.view = 'goalCategory';
        state.activeGoal = null;
        state.goalDeleteArmed = false;
      } else if(state.view === 'goalCategory'){
        state.view = 'tab';
        state.activeGoalCategory = null;
        state.addingGoal = false;
      } else if(state.view === 'recipe'){
        // step back to the recipe category page this was opened from
        state.view = 'recipeCategory';
        state.activeRecipe = null;
        state.recipeDeleteArmed = false;
        state.recipeUseStatus = '';
      } else if(state.view === 'recipeCategory'){
        state.view = 'tab';
        state.activeRecipeCategory = null;
        state.addingRecipe = false;
      } else {
        state.view = 'tab';
        state.activeProject = null;
        state.deleteArmed = false;
        state.activeBudget = null;
        state.budgetDeleteArmed = false;
        state.activeSavingsGoal = null;
        state.savingsDeleteArmed = false;
      }
      render(); window.scrollTo(0,0);
    });

    if(state.view === 'sync'){
      const syncNowBtn = root.querySelector('#sync-now-btn');
      if(syncNowBtn) syncNowBtn.addEventListener('click', () => { pushToCloud(); render(); });
      const signOutBtn = root.querySelector('#sign-out-btn');
      if(signOutBtn) signOutBtn.addEventListener('click', signOutOfSync);
      const pushEnableBtn = root.querySelector('#push-enable-btn');
      if(pushEnableBtn) pushEnableBtn.addEventListener('click', enablePushNotifications);
      const pushDisableBtn = root.querySelector('#push-disable-btn');
      if(pushDisableBtn) pushDisableBtn.addEventListener('click', disablePushNotifications);
      const passcodeBtn = root.querySelector('#passcode-btn');
      const passcodeInput = root.querySelector('#passcode-input');
      if(passcodeBtn && passcodeInput){
        const doUnlock = () => { if(passcodeInput.value) signInWithPasscode(passcodeInput.value); };
        passcodeBtn.addEventListener('click', doUnlock);
        passcodeInput.addEventListener('keydown', e => { if(e.key === 'Enter') doUnlock(); });
      }
      root.querySelector('#export-btn').addEventListener('click', exportData);
      const importBtn = root.querySelector('#import-btn');
      const importFile = root.querySelector('#import-file');
      importBtn.addEventListener('click', () => importFile.click());
      importFile.addEventListener('change', e => {
        const file = e.target.files[0];
        if(file) importDataFromFile(file);
        e.target.value = '';
      });
      const importConfirmBtn = root.querySelector('#import-confirm-btn');
      const importCancelBtn = root.querySelector('#import-cancel-btn');
      if(importConfirmBtn) importConfirmBtn.addEventListener('click', () => {
        state.projects = state.importPending.projects;
        state.budgets = state.importPending.budgets;
        state.savingsGoals = state.importPending.savingsGoals;
        state.earnings = state.importPending.earnings;
        state.calendarBlocks = state.importPending.calendarBlocks;
        state.todoTasks = state.importPending.todoTasks;
        state.goals = state.importPending.goals;
        state.groceryItems = state.importPending.groceryItems;
        state.recipes = state.importPending.recipes;
        state.importPending = null;
        state.importStatus = 'ok:Import complete.';
        save();
      });
      if(importCancelBtn) importCancelBtn.addEventListener('click', () => { state.importPending = null; render(); });
      return;
    }

    if(state.view === 'tab' && state.tab === 'projects'){
      root.querySelectorAll('[data-open]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeProject = btn.getAttribute('data-open');
          state.view = 'project';
          state.deleteArmed = false;
          render(); window.scrollTo(0,0);
        });
      });
      if(state.addingProject){
        const input = root.querySelector('#new-project-input');
        const saveBtn = root.querySelector('#new-project-save');
        const cancelBtn = root.querySelector('#new-project-cancel');
        if(input) input.focus();
        const doSave = () => {
          const v = input.value.trim();
          if(!v) return;
          addProject(v);
        };
        saveBtn.addEventListener('click', doSave);
        cancelBtn.addEventListener('click', () => { state.addingProject = false; render(); });
        input.addEventListener('keydown', e => {
          if(e.key === 'Enter') doSave();
          if(e.key === 'Escape'){ state.addingProject = false; render(); }
        });
      } else {
        root.querySelector('#add-project-btn').addEventListener('click', () => { state.addingProject = true; render(); });
      }
      return;
    }

    if(state.view === 'tab' && state.tab === 'more'){
      root.querySelectorAll('[data-open-more]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.tab = btn.getAttribute('data-open-more');
          state.view = 'tab';
          render(); window.scrollTo(0,0);
        });
      });
      return;
    }

    if(state.view === 'tab' && state.tab === 'finance'){
      root.querySelectorAll('[data-open-category]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.financeCategory = btn.getAttribute('data-open-category');
          state.view = 'financeCategory';
          render(); window.scrollTo(0,0);
        });
      });
      return;
    }

    if(state.view === 'financeCategory' && state.financeCategory === 'savings'){
      root.querySelectorAll('[data-open-savings]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeSavingsGoal = btn.getAttribute('data-open-savings');
          state.view = 'savings';
          state.savingsDeleteArmed = false;
          render(); window.scrollTo(0,0);
        });
      });
      if(state.addingSavingsGoal){
        const nameInput = root.querySelector('#new-savings-name');
        const targetInput = root.querySelector('#new-savings-target');
        const saveBtn = root.querySelector('#new-savings-save');
        const cancelBtn = root.querySelector('#new-savings-cancel');
        if(nameInput) nameInput.focus();
        const doSave = () => {
          const name = nameInput.value.trim();
          const target = toMoney(targetInput.value);
          if(!name || target <= 0) return;
          addSavingsGoal(name, target);
        };
        saveBtn.addEventListener('click', doSave);
        cancelBtn.addEventListener('click', () => { state.addingSavingsGoal = false; render(); });
        targetInput.addEventListener('keydown', e => { if(e.key === 'Enter') doSave(); });
      } else {
        const addSavingsBtn = root.querySelector('#add-savings-btn');
        if(addSavingsBtn) addSavingsBtn.addEventListener('click', () => { state.addingSavingsGoal = true; render(); });
      }
      return;
    }

    if(state.view === 'financeCategory' && state.financeCategory === 'earnings'){
      root.querySelectorAll('[data-del-earning]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-del-earning');
          state.earnings = state.earnings.filter(x => x.id !== id);
          save();
        });
      });
      const amountInput = root.querySelector('#earning-amount');
      const noteInput = root.querySelector('#earning-note');
      const addEarningBtn = root.querySelector('#add-earning-btn');
      const doAddEarning = () => {
        const amount = toMoney(amountInput.value);
        if(amount <= 0) return;
        state.earnings.push({ id: makeId(), amount, note: noteInput.value.trim(), date: new Date().toISOString() });

      const HOLD_MS = 500, MOVE_CANCEL_PX = 10, DRAG_START_PX = 4;
      root.querySelectorAll('[data-open-block]').forEach(el => {
        const blockId = el.getAttribute('data-open-block');
        const b = state.calendarBlocks.find(x => x.id === blockId);
        if(!b) return;
        let holdTimer = null, armed = false, moved = false, cancelled = false;
        let startY = 0, startTop = 0, durMin = 0, maxTop = 0;
        const clearHold = () => { if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; } };
        el.addEventListener('pointerdown', e => {
          armed = false; moved = false; cancelled = false;
          startY = e.clientY;
          startTop = parseFloat(el.style.top) || 0;
          durMin = timeToMinutes(b.end) - timeToMinutes(b.start);
          maxTop = totalTimelineHeight - el.offsetHeight;
          try{ el.setPointerCapture(e.pointerId); }catch(err){}
          clearHold();
          holdTimer = setTimeout(() => {
            armed = true;
            el.style.touchAction = 'none';
            el.style.boxShadow = '0 8px 20px rgba(0,0,0,0.45)';
            el.style.zIndex = '5';
            el.style.transform = 'scale(1.02)';
          }, HOLD_MS);
        });
        el.addEventListener('pointermove', e => {
          const dy = e.clientY - startY;
          if(!armed){
            if(Math.abs(dy) > MOVE_CANCEL_PX){ cancelled = true; clearHold(); }
            return;
          }
          if(Math.abs(dy) > DRAG_START_PX) moved = true;
          if(!moved) return;
          e.preventDefault();
          const newTop = Math.min(Math.max(0, startTop + dy), maxTop);
          el.style.top = newTop + 'px';

        const finishDrag = () => {
          clearHold();
          if(armed && moved){
            const finalTop = parseFloat(el.style.top) || 0;
            const rawStartMin = CAL_DAY_START * 60 + (finalTop / CAL_PX_PER_HOUR) * 60;
            let newStartMin = Math.round(rawStartMin / 5) * 5;
            newStartMin = Math.max(CAL_DAY_START * 60, Math.min(newStartMin, CAL_DAY_END * 60 - durMin));
            const newEndMin = newStartMin + durMin;
            b.start = minutesToTime(newStartMin);
            b.end = minutesToTime(newEndMin);
            if(!b.recurring && !b.date) b.date = state.calendarDate;
            save();
          }
          armed = false;
        };
        el.addEventListener('pointerup', finishDrag);
        el.addEventListener('pointercancel', () => { clearHold(); armed = false; });
        el.addEventListener('click', e => {
          if(cancelled || moved){ cancelled = false; moved = false; e.preventDefault(); e.stopPropagation(); return; }

  }

  function addSavingsGoal(name, target){
    const newG = { id: makeId(), name: name.trim(), target, contributions: [] };
    state.savingsGoals.push(newG);
    state.activeSavingsGoal = newG.id;
    state.view = 'savings';
    state.addingSavingsGoal = false;
    save();
  }

  function addCalendarBlock(title, start, end, recurring, type){
    const validType = CALENDAR_BLOCK_TYPES.some(t => t.key === type) ? type : 'other';
    const newB = { id: makeId(), title: title.trim(), start, end, recurring, date: recurring ? null : state.calendarDate, type: validType };
    state.calendarBlocks.push(newB);
    state.addingCalendarBlock = false;
    state.newBlockType = 'meeting';
    save();
  }

  function wireTodoRowInteractions(){
    root.querySelectorAll('[data-toggle-todo]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-toggle-todo');
        const t = state.todoTasks.find(x => x.id === id);
        if(t){ t.done = !t.done; save(); }
      });
    });
    root.querySelectorAll('[data-del-todo]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-del-todo');
        state.todoTasks = state.todoTasks.filter(x => x.id !== id);
        save();
      });
    });
    root.querySelectorAll('[data-set-priority]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-set-priority');
        const p = parseInt(btn.getAttribute('data-priority-val'), 10);
        const t = state.todoTasks.find(x => x.id === id);
        if(t){ t.priority = p; save(); }
      });
    });
    root.querySelectorAll('[data-due-date]').forEach(input => {
      input.addEventListener('change', () => {
        const id = input.getAttribute('data-due-date');
        const t = state.todoTasks.find(x => x.id === id);
        if(t){ t.dueDate = input.value || null; save(); }
      });
    });
  }

  function addTodoTask(text, category, priority, dueDate){
    const newT = { id: makeId(), text: text.trim(), category: category === 'home' ? 'home' : 'school', priority, dueDate: dueDate || null, done: false };
    state.todoTasks.push(newT);
    state.addingTodoTask = false;
    state.newTodoPriority = 2;
    save();
  }

  function addGoal(name, category){
    const newG = { id: makeId(), category, name: name.trim(), plan: '' };
    state.goals.push(newG);
    state.activeGoal = newG.id;
    state.view = 'goal';
    state.addingGoal = false;
    save();
  }

  function addGroceryItem(category, text){
    state.groceryItems.push({ id: makeId(), category: validGroceryCategory(category), text: text.trim(), done: false, fromRecipe: null });
    save();
  }

  function addRecipe(title, category){
    const newR = { id: makeId(), category, title: title.trim(), ingredients: [], instructions: '' };
    state.recipes.push(newR);
    state.activeRecipe = newR.id;
    state.view = 'recipe';
    state.addingRecipe = false;
    save();
  }

  function useRecipe(r){
    r.ingredients.forEach(ing => {
      state.groceryItems.push({ id: makeId(), category: ing.category, text: ing.text, done: false, fromRecipe: r.id });
    });
    state.recipeUseStatus = r.ingredients.length
      ? `Added ${r.ingredients.length} ingredient${r.ingredients.length===1?'':'s'} to your grocery list.`
      : 'This recipe has no ingredients yet.';
    save();
  }

  function exportData(){
    const payload = { app: 'project-hub', version: 1, exportedAt: new Date().toISOString(), projects: state.projects, budgets: state.budgets, savingsGoals: state.savingsGoals, earnings: state.earnings, calendarBlocks: state.calendarBlocks, todoTasks: state.todoTasks, goals: state.goals, groceryItems: state.groceryItems, recipes: state.recipes };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'project-hub-export-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importDataFromFile(file){
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        const incomingProjects = (parsed && parsed.projects) ? parsed.projects : (Array.isArray(parsed) ? parsed : null);
        if(!Array.isArray(incomingProjects)) throw new Error('unrecognized format');
        state.importPending = {
          projects: normalizeProjects(incomingProjects),
          budgets: normalizeBudgets(parsed && parsed.budgets),
          savingsGoals: normalizeSavingsGoals(parsed && parsed.savingsGoals),
          earnings: normalizeEarnings(parsed && parsed.earnings),
          calendarBlocks: normalizeCalendarBlocks(parsed && parsed.calendarBlocks),
          todoTasks: normalizeTodoTasks(parsed && parsed.todoTasks),
          goals: normalizeGoals(parsed && parsed.goals),
          groceryItems: normalizeGroceryItems(parsed && parsed.groceryItems),
          recipes: normalizeRecipes(parsed && parsed.recipes)
        };
        state.importStatus = '';
        render();
      }catch(e){
        state.importStatus = 'error:Could not read that file — make sure it is a Project Hub export.';
        render();
      }
    };
    reader.readAsText(file);
  }

  loadState();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
